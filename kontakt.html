<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./image/logga.png" />
    <title>Kontakta oss | M STHLM AB – Kostnadsfri konsultation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/kontakt.css" />

    <!-- SEO -->
    <link rel="canonical" href="https://msthlm.se/kontakt.html" />
    <meta
      name="description"
      content="Kontakta M STHLM AB för en kostnadsfri konsultation. Vi hjälper dig med bokföring, lönehantering och redovisning i Mälardalen."
    />

    <!-- Delning -->
    <meta property="og:title" content="Kontakta oss | M STHLM AB" />
    <meta
      property="og:description"
      content="Boka en kostnadsfri konsultation med M STHLM AB – din redovisningsbyrå i Mälardalen."
    />
    <meta property="og:image" content="https://msthlm.se/image/mailbox.jpg" />
    <meta property="og:url" content="https://msthlm.se/kontakt.html" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="sv_SE" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <header>
      <a href="index.html">
        <img
          src="image/logga.png"
          alt="Svart bakgrund med vittext som säger M STHLM AB Redovisning"
        />
      </a>
      <input type="checkbox" id="menu-toggle" />
      <label for="menu-toggle" class="menu-icon">&#9776;</label>
      <nav class="menu">
        <ul>
          <li><a href="index.html">Hem</a></li>
          <li><a href="service.html">Våra tjänster</a></li>
          <li>
            <a href="kontakt.html" class="inline-block font-bold"
              >Kontakta oss</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <img
        src="image/mailbox.jpg"
        alt="en svartvit bild på en brevlåda"
        class="opacity-80"
      />
      <article class="hero-text">
        <h1>Kontakta oss för kostnadsfri konsultation redan idag!</h1>
      </article>
    </main>

    <hr class="divider" />

    <section class="contact-section">
      <div class="contact-info">
        <p>M STHLM AB - Redovisning<br />Nykvarn<br />Sweden</p>
        <p>070-4302399</p>
        <p>info@msthlm.se</p>
      </div>

      <div class="form-card">
        <form id="kontakt-form">
          <div class="field">
            <label for="foretag">Företagsnamn</label>
            <input type="text" id="foretag" name="foretag" />
          </div>

          <div class="field">
            <label for="namn">Namn <span class="req">*</span></label>
            <input type="text" id="namn" name="namn" required />
          </div>

          <div class="field">
            <label for="orgnr">Organisationsnummer / Personnummer</label>
            <input
              type="text"
              id="orgnr"
              name="orgnr"
              placeholder="556XXX-XXXX"
            />
          </div>

          <div class="field">
            <label for="telefon">Telefon <span class="req">*</span></label>
            <input type="tel" id="telefon" name="telefon" required />
          </div>

          <div class="field">
            <label for="epost">E-post <span class="req">*</span></label>
            <input type="email" id="epost" name="epost" required />
          </div>

          <div class="field">
            <label for="amne">Ämne <span class="req">*</span></label>
            <input type="text" id="amne" name="amne" required />
          </div>

          <div class="field">
            <label for="meddelande"
              >Meddelande <span class="req">*</span></label
            >
            <textarea id="meddelande" name="meddelande" required></textarea>
          </div>

          <p id="form-success" class="form-success" style="display: none">
            ✓ Tack! Ditt mailprogram öppnas nu med ditt meddelande färdigt att
            skicka.
          </p>

          <input
            type="checkbox"
            name="integritetspolicy"
            id="integritetspolicy"
            required
          />
          <label for="integritetspolicy">
            Klicka i rutan om du godkänner vår
            <a href="./integritetspolicy.html" target="_blank"
              >integritetspolicy</a
            >
          </label>

          <button type="submit" class="btn-submit">Skicka</button>
        </form>
      </div>
    </section>

    <script src="./scripts/kontakt.js"></script>
    <script>
      const header = document.querySelector("header");
      window.addEventListener("scroll", () => {
        header.classList.toggle("scrolled", window.scrollY > 80);
      });
    </script>
  </body>
</html>
